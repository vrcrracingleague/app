<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VRC Racing League - Riepilogo Gare">
    <meta name="theme-color" content="#e63946">
    
    <title>VRC Racing League - Gare 🏁</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>🏁 VRC Racing League</h1>
            <p class="subtitle">Riepilogo Gare</p>
        </header>

        <!-- ERROR MESSAGE -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <span id="errorText"></span>
            <span id="closeErrorBtn" class="close-btn">✕</span>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="🔍 Cerca per nome gara, gioco, host, pista..."
                aria-label="Cerca gare"
            >
            <select id="filterSelect" class="filter-select" aria-label="Filtra per stato">
                <option value="all">📊 Tutti gli stati</option>
                <option value="active">🏁 Attivo</option>
                <option value="upcoming">📅 Prossimamente</option>
                <option value="concluded">✅ Concluso</option>
                <option value="cancelled">❌ Annullato</option>
            </select>
            <button id="refreshBtn" class="refresh-btn" aria-label="Aggiorna dati">
                🔄 Aggiorna Dati
            </button>
        </div>

        <!-- STATISTICS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalStat">0</div>
                <div class="stat-label">Totale Gare</div>
            </div>
            <div class="stat-card upcoming">
                <div class="stat-number" id="programmadoStat">0</div>
                <div class="stat-label">Prossimamente</div>
            </div>
            <div class="stat-card active">
                <div class="stat-number" id="inProgressStat">0</div>
                <div class="stat-label">Attive</div>
            </div>
            <div class="stat-card concluded">
                <div class="stat-number" id="completedStat">0</div>
                <div class="stat-label">Concluse</div>
            </div>
            <div class="stat-card cancelled">
                <div class="stat-number" id="cancelledStat">0</div>
                <div class="stat-label">Annullate</div>
            </div>
        </div>

        <!-- LAST UPDATE -->
        <div id="lastUpdate" class="last-update">
            Ultimo aggiornamento: --:--:--
        </div>

        <!-- RACES CONTAINER -->
        <div id="eventsContainer" class="events-container">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Caricamento gare...</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
